<div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3 p-4">
  @for (image of images(); track image.id; let i = $index) {
    <div [class.col-span-2]="i === 0" [class.row-span-2]="i === 0">
      <app-image-item
        [image]="image"
        [isFeatured]="i === 0"
      />
    </div>
  }
</div>
