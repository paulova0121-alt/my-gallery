<div 
  (click)="onSelect()"
  class="group relative overflow-hidden rounded-lg w-full cursor-pointer"
  [class.ring-2]="isSelected()"
  [class.ring-blue-500]="isSelected()"
  style="height: 150px;">
  <img 
    [src]="image().url" 
    [alt]="image().alt"
    class="w-full h-full object-cover"
  />
  @if (isSelected()) {
    <div class="absolute inset-0 bg-blue-500 bg-opacity-20 flex items-center justify-center">
      <span class="bg-blue-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-sm">✓</span>
    </div>
  }
  <button 
    (click)="onDelete($event)"
    class="absolute top-2 right-2 bg-red-500 text-white rounded-full w-7 h-7 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"
    aria-label="Eliminar imagen">
    ✕
  </button>
</div>
